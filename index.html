<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunker Game Web App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/skeleton/2.0.4/skeleton.min.css">
    <style>
        body { background: #121212; color: #e0e0e0; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        h5 { color: #888; text-transform: uppercase; font-size: 1.2rem; margin-bottom: 5px; }
        .value { font-size: 2rem; color: #fff; margin-bottom: 20px; font-weight: bold; }
        .disaster-box { border-left: 4px solid #f44336; padding-left: 15px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="disaster-box">
                <h5>Мир после:</h5>
                <div id="disaster-title" class="value">Загрузка...</div>
            </div>

            <h5>Ваша роль:</h5>
            <div id="job" class="value">...</div>

            <h5>Состояние здоровья:</h5>
            <div id="health" class="value">...</div>

            <h5>Багаж:</h5>
            <div id="item" class="value">...</div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
