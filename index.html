<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bunker: Protocol Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sig-yellow: #F2C14E;
            --deep-black: #292C2F;
            --hazard-blue: #3A86FF;
            --signal-red: #D1495B;
        }

        body { 
            margin: 0; background-color: #1a1c1e;
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; font-family: 'Roboto Condensed', sans-serif;
            background-image: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%),
                              url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .card {
            width: 92%; max-width: 380px;
            background: var(--sig-yellow);
            border: 5px solid var(--deep-black);
            padding: 30px 20px 20px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.6);
            /* Текстура износа */
            background-image: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.05) 100%),
                              url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="f"><feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23f)" opacity="0.12"/></svg>');
        }

        .hazard-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 12px;
            background: repeating-linear-gradient(-45deg, var(--deep-black), var(--deep-black) 10px, transparent 10px, transparent 20px);
            border-bottom: 2px solid var(--deep-black);
        }

        .header {
            display: flex; justify-content: space-between; align-items: baseline;
            border-bottom: 4px solid var(--deep-black); padding-bottom: 5px; margin-bottom: 15px;
        }

        .header h1 {
            font-family: 'Bebas Neue', cursive; font-size: 2.5rem; margin: 0;
            color: var(--deep-black); letter-spacing: 1px;
        }

        .id-label {
            background: var(--deep-black); color: var(--sig-yellow);
            font-family: 'Bebas Neue'; font-size: 1.1rem; padding: 2px 8px;
        }

        #traits-list { display: flex; flex-direction: column; gap: 10px; }

        .trait {
            background: rgba(0,0,0,0.04); border: 2px solid var(--deep-black);
            padding: 10px 12px; position: relative; cursor: pointer;
            display: flex; flex-direction: column; min-height: 55px;
            justify-content: center;
        }

        .label {
            font-family: 'Bebas Neue'; font-size: 0.9rem; color: var(--deep-black);
            opacity: 0.7; margin-bottom: 2px; line-height: 1;
        }

        .value {
            font-size: clamp(1.1rem, 4.2vw, 1.4rem); 
            color: var(--deep-black); font-weight: 800;
            text-transform: uppercase; line-height: 1.1;
            word-wrap: break-word; overflow-wrap: break-word;
            filter: blur(18px); opacity: 0; 
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .trait.open .value { filter: blur(0px); opacity: 1; }

        .status-box {
            position: absolute; top: 5px; right: 5px;
            font-family: 'Bebas Neue'; font-size: 0.7rem;
            padding: 1px 4px; border: 1px solid var(--deep-black);
        }
        
        .trait.open .status-box { color: var(--hazard-blue); border-color: var(--hazard-blue); }
        .trait:not(.open) .status-box { color: var(--signal-red); border-color: var(--signal-red); }

        /* Кнопка катастрофы */
        .disaster-btn {
            width: 100%; margin-top: 20px; background: var(--signal-red);
            color: white; border: 3px solid var(--deep-black);
            font-family: 'Bebas Neue'; font-size: 1.3rem; padding: 12px;
            cursor: pointer; box-shadow: 4px 4px 0px var(--deep-black);
        }
        .disaster-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--deep-black); }

        /* Модальное окно */
        .modal {
            display: none; position: fixed; z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--sig-yellow); margin: 20% auto; padding: 40px 20px;
            border: 5px solid var(--deep-black); width: 85%; max-width: 380px;
            position: relative; box-shadow: 15px 15px 0px rgba(0,0,0,0.5);
        }

        .modal-content h2 { font-family: 'Bebas Neue'; color: var(--signal-red); font-size: 2rem; margin: 0 0 10px; border-bottom: 2px solid var(--deep-black); }
        .modal-content p { color: var(--deep-black); font-size: 1.1rem; line-height: 1.3; font-weight: bold; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 2rem; cursor: pointer; color: var(--deep-black); }

        footer {
            margin-top: 15px; display: flex; justify-content: space-between;
            font-size: 0.65rem; font-weight: bold; color: var(--deep-black);
            letter-spacing: 1px; opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="hazard-bar"></div>
        <div class="header">
            <h1>БУНКЕР</h1>
            <div class="id-label" id="player-id">ID-01</div>
        </div>

        <div id="traits-list"></div>

        <button class="disaster-btn" onclick="openDisaster()">ВНЕШНЯЯ УГРОЗА</button>

        <footer>
            <span>Emergency System 2.6</span>
            <span style="color: var(--signal-red)">● Restricted</span>
        </footer>
    </div>

    <div id="disaster-modal" class="modal">
        <div class="modal-content">
            <div class="hazard-bar"></div>
            <span class="close-modal" onclick="closeDisaster()">&times;</span>
            <h2 id="d-title">АНАЛИЗ УГРОЗЫ...</h2>
            <p id="d-desc">Загрузка данных из центра разведки...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
