<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bunker: Protocol Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes traitSlide {
            from {
                opacity: 0;
                transform: translateX(-15px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        :root {
            --sig-yellow: #e9af29;
            --deep-black: #292C2F;
            --hazard-blue: #3A86FF;
            --signal-red: #D1495B;
            --signal-green: #4CAF50;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            background-color: #0a0c0e;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: 'Roboto Condensed', sans-serif;
            background: 
                radial-gradient(circle at 20% 50%, rgba(58, 134, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(209, 73, 91, 0.08) 0%, transparent 50%),
                #0a0c0e;
            padding: 10px;
        }

        .card {
            width: 100%;
            max-width: 360px;
            background: linear-gradient(135deg, var(--sig-yellow) 0%, #f5d980 100%);
            border: 4px solid var(--deep-black);
            padding: 18px 16px 14px;
            position: relative;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8), 
                        0 0 30px rgba(58, 134, 255, 0.25),
                        inset 0 0 15px rgba(255, 255, 255, 0.08);
            animation: cardEntry 0.6s ease-out;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 20px);
            overflow-y: auto;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.05) 100%);
            pointer-events: none;
        }

        .hazard-bar {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 10px;
            background: repeating-linear-gradient(-45deg, var(--deep-black), var(--deep-black) 10px, transparent 10px, transparent 20px);
        }

        .header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 3px solid var(--deep-black); 
            padding-bottom: 6px; 
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
            gap: 10px;
        }

        .header h1 {
            font-family: 'Bebas Neue', cursive; 
            font-size: 2.2rem; 
            margin: 0;
            color: var(--deep-black); 
            letter-spacing: 2px;
            text-transform: uppercase;
            flex: 1;
        }

        .id-label {
            background: linear-gradient(135deg, var(--deep-black) 0%, #1a1c1e 100%);
            color: var(--sig-yellow);
            font-family: 'Bebas Neue'; 
            font-size: 0.9rem; 
            padding: 3px 8px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        #traits-list { 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .trait {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(0, 0, 0, 0.06) 100%);
            border: 2px solid var(--deep-black);
            padding: 8px 10px; 
            position: relative; 
            cursor: pointer;
            display: flex; 
            flex-direction: column; 
            min-height: 45px;
            justify-content: center;
            transition: all 0.25s ease-out;
            animation: traitSlide 0.5s ease-out backwards;
            overflow: hidden;
        }

        .trait:nth-child(1) { animation-delay: 0.05s; }
        .trait:nth-child(2) { animation-delay: 0.1s; }
        .trait:nth-child(3) { animation-delay: 0.15s; }
        .trait:nth-child(4) { animation-delay: 0.2s; }
        .trait:nth-child(5) { animation-delay: 0.25s; }
        .trait:nth-child(6) { animation-delay: 0.3s; }

        .trait:hover {
            transform: translateY(-1px) scale(1.01);
        }

        .label {
            font-family: 'Bebas Neue'; 
            font-size: 0.75rem; 
            color: var(--deep-black);
            opacity: 0.65; 
            margin-bottom: 2px; 
            line-height: 1;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .value {
            font-size: clamp(0.95rem, 3.5vw, 1.25rem); 
            color: var(--deep-black); 
            font-weight: 900;
            text-transform: uppercase; 
            line-height: 1.05;
            word-wrap: break-word; 
            overflow-wrap: break-word;
            filter: blur(18px); 
            opacity: 0; 
            transition: 0.4s ease;
            position: relative;
            z-index: 2;
        }

        .trait.open .value { 
            filter: blur(0px); 
            opacity: 1;
        }

        .status-box {
            position: absolute; 
            top: 5px; 
            right: 5px;
            font-family: 'Bebas Neue'; 
            font-size: 0.65rem;
            padding: 1px 5px; 
            border: 1.5px solid var(--deep-black);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
            z-index: 3;
            transition: all 0.2s ease;
        }
        
        .trait.open .status-box { 
            color: var(--signal-green); 
        }

        .trait:not(.open) .status-box { 
            color: var(--signal-red); 
            border-color: var(--signal-red);
            box-shadow: 0 0 6px rgba(209, 73, 91, 0.25);
        }

        /* Кнопка катастрофы */
        .disaster-btn {
            width: 100%; 
            margin-top: 12px; 
            background: linear-gradient(135deg, var(--signal-red) 0%, #a03844 100%);
            color: white; 
            border: 3px solid var(--deep-black);
            font-family: 'Bebas Neue'; 
            font-size: 1.15rem; 
            padding: 12px;
            cursor: pointer; 
            box-shadow: 0 8px 25px rgba(209, 73, 91, 0.4), 3px 3px 0px var(--deep-black);
            transition: all 0.2s ease;
            position: relative;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            z-index: 1;
            font-weight: bold;
        }

        .disaster-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(209, 73, 91, 0.6), 4px 4px 0px var(--deep-black);
        }

        .disaster-btn:active { 
            transform: translate(1px, 1px); 
            box-shadow: 1px 1px 0px var(--deep-black); 
        }

        .disaster-btn:disabled { 
            opacity: 0.5; 
            cursor: not-allowed;
        }

        /* Модальное окно */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100;
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.88); 
            backdrop-filter: blur(6px);
        }

        .modal-content {
            background: linear-gradient(135deg, var(--sig-yellow) 0%, #f5d980 100%); 
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 20px;
            border: 4px solid var(--deep-black); 
            width: 85%; 
            max-width: 360px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.85),
                        0 0 40px rgba(58, 134, 255, 0.25);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .modal-content h2 { 
            font-family: 'Bebas Neue'; 
            color: var(--signal-red); 
            font-size: 1.9rem; 
            margin: 0 0 12px;
            border-bottom: 2px solid var(--deep-black);
            padding-bottom: 8px;
            letter-spacing: 1px;
        }

        .modal-content p { 
            color: var(--deep-black); 
            font-size: 1rem; 
            line-height: 1.35; 
            font-weight: bold;
        }

        .close-modal { 
            position: absolute; 
            top: 12px; 
            right: 12px; 
            font-size: 2rem; 
            cursor: pointer; 
            color: var(--signal-red);
            transition: all 0.2s ease;
            line-height: 1;
        }

        .close-modal:hover {
            transform: scale(1.15);
        }

        footer {
            margin-top: 10px; 
            display: flex; 
            justify-content: space-between;
            font-size: 0.6rem; 
            font-weight: bold; 
            color: var(--deep-black);
            letter-spacing: 0.5px; 
            opacity: 0.7;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="hazard-bar"></div>
        <div class="header">
            <h1>БУНКЕР</h1>
            <div class="id-label" id="player-id">ID-01</div>
        </div>

        <div id="traits-list"></div>

        <button class="disaster-btn" onclick="openDisaster()">ВНЕШНЯЯ УГРОЗА</button>

        <footer>
            <span>Emergency System 2.6</span>
            <span style="color: var(--signal-red)">● Restricted</span>
        </footer>
    </div>

    <div id="disaster-modal" class="modal">
        <div class="modal-content">
            <div class="hazard-bar"></div>
            <span class="close-modal" onclick="closeDisaster()">&times;</span>
            <h2 id="d-title">АНАЛИЗ УГРОЗЫ...</h2>
            <p id="d-desc">Загрузка данных из центра разведки...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
